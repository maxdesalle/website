<div id="search-overlay" hidden role="dialog" aria-modal="true" aria-label="Search">
  <div id="search-panel">
    <input id="search-input" type="text" autocomplete="off" autocapitalize="off"
           autocorrect="off" spellcheck="false" placeholder="Search posts, podcast, talks…"
           aria-label="Search" aria-controls="search-results" aria-expanded="true" />
    <ul id="search-results" role="listbox" aria-label="Search results"></ul>
    <div id="search-empty" hidden>No results.</div>
    <div id="search-hint"><kbd>↑</kbd><kbd>↓</kbd> to navigate&nbsp;&nbsp;<kbd>↵</kbd> to open&nbsp;&nbsp;<kbd>esc</kbd> to close</div>
  </div>
</div>

<style>
  #search-overlay {
    position: fixed; inset: 0; z-index: 1000;
    display: flex; align-items: flex-start; justify-content: center;
    padding: 12vh 16px 16px;
    background: rgba(0, 0, 0, 0.28);
  }
  #search-overlay[hidden] { display: none; }
  #search-panel {
    width: 100%; max-width: 560px;
    background: #ffffff;
    border: 1px solid #d8d8d8;
    border-radius: 4px;
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.18);
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  #search-input {
    width: 100%; box-sizing: border-box;
    padding: 14px 16px;
    font-size: 16px; color: #313a3d;
    border: 0; border-bottom: 1px solid #d8d8d8;
    outline: none; background: #ffffff;
  }
  #search-input::placeholder { color: #767676; }
  #search-results { list-style: none; margin: 0; padding: 0; max-height: 48vh; overflow-y: auto; }
  #search-results li {
    padding: 10px 16px; cursor: pointer;
    border-bottom: 1px solid #f0f0f0;
  }
  #search-results li:last-child { border-bottom: 0; }
  #search-results li[aria-selected="true"] { background: rgb(245, 245, 245); }
  .sr-title { display: block; font-size: 15px; color: #313a3d; }
  .sr-title mark { background: #ffef9f; color: inherit; padding: 0; }
  .sr-meta { display: block; font-size: 12px; color: #767676; margin-top: 2px; }
  .sr-meta .sr-section { text-transform: lowercase; }
  #search-empty { padding: 16px; font-size: 14px; color: #767676; }
  #search-hint {
    padding: 8px 16px; font-size: 11px; color: #999;
    border-top: 1px solid #d8d8d8; background: rgb(250, 250, 250);
  }
  #search-hint kbd {
    font-family: inherit; font-size: 11px; color: #767676;
    background: #ffffff; border: 1px solid #d8d8d8; border-radius: 3px;
    padding: 0 4px; margin: 0 1px;
  }
</style>

<script>
(function () {
  var overlay = document.getElementById("search-overlay");
  if (!overlay) return;
  var input = document.getElementById("search-input");
  var list = document.getElementById("search-results");
  var empty = document.getElementById("search-empty");
  var data = null, results = [], active = -1, lastFocus = null;

  function esc(s) { return s.replace(/[&<>"]/g, function (c) {
    return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]; }); }

  function highlight(text, q) {
    if (!q) return esc(text);
    var i = text.toLowerCase().indexOf(q);
    if (i < 0) return esc(text);
    return esc(text.slice(0, i)) + "<mark>" + esc(text.slice(i, i + q.length)) +
           "</mark>" + esc(text.slice(i + q.length));
  }

  function load() {
    if (data) return Promise.resolve(data);
    return fetch("/index.json").then(function (r) { return r.json(); })
      .then(function (j) { data = j; return j; })
      .catch(function () { data = []; return []; });
  }

  function render(q) {
    list.innerHTML = "";
    active = results.length ? 0 : -1;
    if (!results.length) { empty.hidden = !q; return; }
    empty.hidden = true;
    results.forEach(function (r, idx) {
      var li = document.createElement("li");
      li.setAttribute("role", "option");
      li.setAttribute("aria-selected", idx === active ? "true" : "false");
      li.innerHTML =
        '<span class="sr-title">' + highlight(r.title, q) + "</span>" +
        '<span class="sr-meta"><span class="sr-section">' + esc(r.section || "") +
        "</span>" + (r.description ? " · " + esc(r.description) : "") + "</span>";
      li.addEventListener("click", function () { go(idx); });
      li.addEventListener("mousemove", function () { setActive(idx); });
      list.appendChild(li);
    });
  }

  function search() {
    var q = input.value.trim().toLowerCase();
    if (!q) { results = []; render(""); return; }
    results = (data || []).filter(function (e) {
      var hay = (e.title + " " + (e.description || "") + " " +
        (e.tags || []).join(" ")).toLowerCase();
      return hay.indexOf(q) >= 0;
    }).slice(0, 20);
    render(q);
  }

  function setActive(idx) {
    var items = list.children;
    if (!items.length) return;
    if (active >= 0 && items[active]) items[active].setAttribute("aria-selected", "false");
    active = (idx + items.length) % items.length;
    var el = items[active];
    el.setAttribute("aria-selected", "true");
    el.scrollIntoView({ block: "nearest" });
  }

  function go(idx) {
    var r = results[idx];
    if (r) window.location.href = r.permalink;
  }

  function open() {
    lastFocus = document.activeElement;
    overlay.hidden = false;
    load().then(search);
    input.value = "";
    results = []; render("");
    input.focus();
  }

  function close() {
    overlay.hidden = true;
    if (lastFocus && lastFocus.focus) lastFocus.focus();
  }

  input.addEventListener("input", search);

  document.addEventListener("keydown", function (e) {
    var mod = e.metaKey || e.ctrlKey;
    if (mod && (e.key === "k" || e.key === "K")) { e.preventDefault(); open(); return; }
    if (e.key === "/" && overlay.hidden &&
        !/^(INPUT|TEXTAREA|SELECT)$/.test((e.target.tagName || "")) && !e.target.isContentEditable) {
      e.preventDefault(); open(); return;
    }
    if (overlay.hidden) return;
    if (e.key === "Escape") { e.preventDefault(); close(); }
    else if (e.key === "ArrowDown") { e.preventDefault(); setActive(active + 1); }
    else if (e.key === "ArrowUp") { e.preventDefault(); setActive(active - 1); }
    else if (e.key === "Enter") { e.preventDefault(); if (active >= 0) go(active); }
    else if (e.key === "Tab") { e.preventDefault(); input.focus(); }
  });

  overlay.addEventListener("mousedown", function (e) { if (e.target === overlay) close(); });

  document.addEventListener("click", function (e) {
    var a = e.target.closest && e.target.closest('a[href="#search"], a[href$="#search"]');
    if (a) { e.preventDefault(); open(); }
  });
})();
</script>
